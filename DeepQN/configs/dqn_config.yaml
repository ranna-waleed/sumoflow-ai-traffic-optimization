    green_to_yellow: {"0": 1}
    yellow_to_next:  {"1": 2}
    red_to_green_phase: 0
    yellow_duration: 5
    min_green:       20
    max_green:       80
    incoming_lanes:
      - "10873193#1_0"
      - "10873193#1_1"
      - "10873193#1_2"
      - "10873193#1_3"

  "315743335":
    description: "E-tertiary intermediate (28718874)"
    green_phases:    [0]
    red_hold_phase:  2
    green_to_yellow: {"0": 1}
    yellow_to_next:  {"1": 2}
