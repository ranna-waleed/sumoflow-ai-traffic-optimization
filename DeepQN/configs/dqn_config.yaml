#  State Space 
state:
  max_lanes:         10      # pad all junctions to this many lanes
  features_per_lane: 3       # [halt_count, wait_time, occupancy]
  junction_features: 2       # [phase_idx_norm, phase_elapsed_norm]
  global_features:   5       # [bilstm_N, bilstm_S, bilstm_E, bilstm_W, time_of_day]
  # total state_dim = max_lanes*features_per_lane + junction_features + global_features = 37
  state_dim: 37

  # Normalisation caps
  max_queue:     50.0        # vehicles
  max_wait:      300.0       # seconds
  max_occupancy: 1.0
  max_phase_elapsed: 120.0   # seconds

#  BiLSTM Integration 
bilstm:
  # Edges used as proxies for each cardinal direction
  north_edges: ["690516091#0", "690516091#1"]
  south_edges: ["10873191#3",  "10873191#4",  "10873191#5"]
  east_edges:  ["28718647#1",  "28718647#2",  "28718647#3"]
  west_edges:  ["50211834#0",  "50211834#1",  "192591565#0"]
  max_flow_per_edge: 50      # for normalisation
  # Set to true when actual BiLSTM weights are loaded
  use_real_model: true
  model_path: "detection/bilstm/bilstm_flow_predictor.pt"

#  DQN Hyperparameters 
dqn:
  # Q-network architecture (Dueling DQN)
  state_dim:   37
  action_dim:  2             # 0=keep, 1=switch
  hidden_dims: [256, 256]
  dueling:     true
  noisy_nets:  false

  # Training
  learning_rate:      0.0005
  gamma:              0.95
  batch_size:         64
  replay_buffer_size: 50000
  min_replay_size:    1000
  target_update_freq: 200    # steps between hard target-net updates
  tau:                0.005  # soft update coefficient (if using soft updates)

  # Exploration
  epsilon_start:  1.0
  epsilon_end:    0.05
  epsilon_decay:  0.99992    # per decision step
  eval_epsilon:   0.0        # greedy during evaluation

  # Gradient clipping
  grad_clip: 10.0

#  Training Loop 
training:
  num_episodes:         200
  profiles_per_episode: ["morning_rush", "midday", "evening_rush", "night"]
  profile_rotation:     "sequential"   # or "random"
  checkpoint_dir:       "DeepQN/checkpoints"
  checkpoint_freq:      10             # episodes
  log_dir:              "DeepQN/logs"
  seed:                 42

#  Reward 
reward:
  wait_time_weight:  1.0
  co2_weight:        0.001     # scale: CO2 in mg/s vs wait in seconds
  throughput_weight: 0.5       # bonus per completed vehicle
  pressure_weight:   0.0       # optional queue-balance pressure term
  clip_min:         -200.0
  clip_max:          10.0

#  Evaluation
evaluation:
  num_eval_episodes:  3        # per profile
  baseline_label:     "fixed_time"
  dqn_label:          "dqn_adaptive"
  output_dir:         "DeepQN/results"
  metrics: ["avg_waiting_time", "total_co2", "throughput", "avg_speed"]