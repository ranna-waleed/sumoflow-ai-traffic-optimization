# SUMOFlow AI , DQN Configuration
# Tahrir Square, Cairo  |  7 controllable TLS junctions

#  Simulation 
simulation:
  net_file:   "simulation/maps/tahrirupdated.net.xml"
  add_file:   "simulation/maps/tahrir.add.xml"
  step_length: 1            # seconds per SUMO step (from sumocfg)
  decision_interval: 10     # SUMO steps between DQN decisions
  sumo_binary: "sumo"       # use "sumo-gui" for visual debugging
  port: 8813                # TraCI port (incremented per parallel env)

profiles:
  morning_rush:
    config:    "simulation/maps/config_morning_rush.sumocfg"
    begin:     27000
    end:       37800
    label:     "morning"
  midday:
    config:    "simulation/maps/config_midday.sumocfg"
    begin:     43200
    end:       54000
    label:     "midday"
  evening_rush:
    config:    "simulation/maps/config_evening_rush.sumocfg"
    begin:     54000
    end:       72000
    label:     "evening"
  night:
    config:    "simulation/maps/config_night.sumocfg"
    begin:     79200
    end:       86400
    label:     "night"

#  Traffic Light Junctions 
# Extracted from tahrirupdated.net.xml <tlLogic> + <junction> blocks.
# green_phases : SUMO phase indices that are "green" (actionable).
# green_to_yellow : {green_phase_idx -> its yellow phase idx}
# yellow_to_next  : {yellow_phase_idx -> next green phase idx}
# incoming_lanes  : from <junction incLanes="…"> in net.xml

tls_junctions:

  "315744796":
    description: "N-trunk / E-highway split — highest volume entry"
    green_phases:    [0, 2]
    green_to_yellow: {"0": 1, "2": 3}
    yellow_to_next:  {"1": 2, "3": 0}
    yellow_duration: 6
    min_green:       15
    max_green:       60
    incoming_lanes:
      - "28718647#3_0"
      - "28718647#3_1"
      - "28718647#3_2"
      - "28718647#3_3"
      - "28718647#3_4"
      - "690516091#0_0"
      - "690516091#0_1"
      - "690516091#0_2"
      - "690516091#0_3"
      - "690516091#0_4"

  "96621100":
    description: "Roundabout N-entry — trunk highway (690516091) meets ring"
    green_phases:    [2]           # phase 0 = all-red hold, phase 2 = all-green
    red_hold_phase:  0
    green_to_yellow: {"2": 1}
    yellow_to_next:  {"1": 0}      # green -> yellow -> red_hold
    red_to_green_phase: 2          # when switching from hold, go to this phase
    yellow_duration: 3
    min_green:       20
    max_green:       90
    incoming_lanes:
      - "690516091#1_0"
      - "690516091#1_1"
      - "690516091#1_2"
      - "690516091#1_3"
      - "690516091#1_4"
      - "10873186#8_0"
      - "10873186#8_1"
      - "10873186#8_2"
      - "10873186#8_3"
      - "10873186#8_4"

  "2031414903":
    description: "Roundabout W-entry — Corniche (50211834) meets ring"
    green_phases:    [0, 2]
    green_to_yellow: {"0": 1, "2": 3}
    yellow_to_next:  {"1": 2, "3": 0}
    yellow_duration: 6
    min_green:       15
    max_green:       60
    incoming_lanes:
      - "50211834#1_0"
      - "50211834#1_1"
      - "50211834#1_2"
      - "50211834#1_3"
      - "10873186#5_0"
      - "10873186#5_1"
      - "10873186#5_2"
      - "10873186#5_3"
      - "10873186#5_4"

  "2031414899":
    description: "S-corridor exit gate (10873191 southbound)"
    green_phases:    [0]
    red_hold_phase:  2
    green_to_yellow: {"0": 1}
    yellow_to_next:  {"1": 2}
    red_to_green_phase: 0
    yellow_duration: 3
    min_green:       20
    max_green:       80
    incoming_lanes:
      - "10873191#3_0"
      - "10873191#3_1"
      - "10873191#3_2"
      - "10873191#3_3"

  "6288771431":
    description: "S-corridor second gate"
    green_phases:    [0]
    red_hold_phase:  2
    green_to_yellow: {"0": 1}
    yellow_to_next:  {"1": 2}
    red_to_green_phase: 0
    yellow_duration: 3
    min_green:       20
