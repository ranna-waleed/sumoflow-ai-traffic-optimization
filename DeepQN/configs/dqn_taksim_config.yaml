# State vector
state:
  max_lanes:        10
  features_per_lane: 3       # halting count, wait time, occupancy
  global_features:   5       # lstm N/S/E/W + time_of_day
  # Total = 10×3 + 2 (junction) + 5 (global) = 37 , same as Tahrir

#  Reward function 
reward:
  wait_weight:       -1.0
  co2_weight:        -0.001
  throughput_weight:  0.5
  clip_min:          -200.0
  clip_max:           10.0

# DQN hyperparameters (same as Tahrir , proven settings)
dqn:
  state_size:        37
  action_size:       2
  hidden_size:       256
  learning_rate:     0.0005
  gamma:             0.95
  epsilon_start:     1.0
  epsilon_end:       0.05
  epsilon_decay:     0.9995
  buffer_size:       50000
  batch_size:        64
  target_update:     10
  checkpoint_every:  10

# BiLSTM adapter 
bilstm:
  features:
    - north
    - south
    - east
    - west
    - total
    - avg_speed
    - avg_waiting
  scaler_max:
    north: 91.0
    south: 43.0
    east:  116.0
    west:  136.0
  history_len: 60

# Evaluation paths
evaluation:
  baseline_output_dir: simulation/taksim/map/baseline_outputs
  results_dir:         DeepQN/results/taksim

# suffix map for baseline XML files
baseline_suffix_map:
  taksim_morning: taksim